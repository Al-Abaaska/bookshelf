<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bookshelf</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a2e">
<script src="books/manifest.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(175deg, #0b0510 0%, #1a0a2e 20%, #3d1a4a 40%, #7a2a5a 55%, #c85a3a 70%, #e8a04a 85%, #f0c060 100%);
  color: rgba(255,255,255,0.85);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
::selection { background: rgba(232,160,74,0.4); color: #fff; }

/* ── fantasy sunset atmosphere ── */
#sky-layer {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden; pointer-events: none;
}
/* sky gradient - midnight blue → purple → magenta → gold → orange */
#sky-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #0b0510 0%, #1a0a2e 20%, #3d1a4a 40%, #7a2a5a 55%, #c85a3a 70%, #e8a04a 85%, #f0c060 100%);
  animation: skyBreath 15s ease-in-out infinite alternate;
}
@keyframes skyBreath {
  0% { filter: brightness(0.95) saturate(0.9); }
  100% { filter: brightness(1.08) saturate(1.1); }
}
/* nebula glow in the center */
#nebula {
  position: absolute; top: 25%; left: 50%; transform: translateX(-50%);
  width: 70%; height: 45%;
  background: radial-gradient(ellipse at 40% 50%, rgba(180,60,120,0.08) 0%, rgba(120,40,100,0.04) 30%, rgba(80,30,120,0.02) 50%, transparent 70%);
  pointer-events: none;
}
#nebula::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 40%, rgba(232,160,90,0.04) 0%, rgba(200,80,60,0.03) 25%, transparent 50%);
}
/* stars */
.star {
  position: absolute; border-radius: 50%; pointer-events: none;
  background: #fff;
  animation: twinkle ease-in-out infinite alternate;
}
.star.blue { background: rgba(180,210,255,0.8); }
.star.bright { box-shadow: 0 0 6px rgba(255,255,255,0.3); }
@keyframes twinkle {
  0% { opacity: 0.15; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.4); }
}
/* constellation clusters */
.constellation {
  position: absolute; pointer-events: none;
}
.constellation-line {
  position: absolute; height: 1px;
  background: rgba(255,255,255,0.04);
  transform-origin: left center;
}
/* dramatic billowing clouds */
.fantasy-cloud {
  position: absolute; border-radius: 50%;
  filter: blur(40px);
  pointer-events: none;
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  0% { transform: translateX(-200px); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateX(calc(100vw + 200px)); opacity: 0; }
}
/* golden light rays through clouds */
#light-rays {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    100deg,
    transparent 0px,
    transparent 80px,
    rgba(232,180,80,0.025) 80px,
    rgba(232,180,80,0.025) 100px,
    transparent 100px,
    transparent 200px
  ),
  repeating-linear-gradient(
    80deg,
    transparent 0px,
    transparent 150px,
    rgba(200,120,60,0.015) 150px,
    rgba(200,120,60,0.015) 165px,
    transparent 165px,
    transparent 300px
  );
  pointer-events: none;
  animation: raysShift 20s linear infinite;
}
@keyframes raysShift {
  0% { transform: translateX(0); }
  100% { transform: translateX(300px); }
}
/* atmospheric pink/magenta glow */
#atmospheric-glow {
  position: absolute; bottom: 25%; left: 0; right: 0;
  height: 40%;
  background: radial-gradient(ellipse at 50% 100%, rgba(200,80,120,0.06) 0%, rgba(150,50,100,0.03) 30%, transparent 60%);
  pointer-events: none;
}
/* landscape silhouette - dark trees at bottom edges */
#landscape-silhouette {
  position: absolute; bottom: 0; left: 0; right: 0; height: 25%;
  pointer-events: none;
}
#landscape-silhouette svg {
  position: absolute; bottom: 0; width: 100%; height: 100%;
}
/* warm mist valley */
#valley-mist {
  position: absolute; bottom: 8%; left: 0; right: 0; height: 20%;
  background: linear-gradient(0deg, rgba(232,160,90,0.04) 0%, rgba(200,80,60,0.02) 30%, transparent 100%);
  pointer-events: none;
}
/* glowing sun/light source just below horizon */
#sun-core {
  position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle at center, rgba(255,220,120,0.08) 0%, rgba(232,160,90,0.04) 30%, transparent 60%);
  border-radius: 50%;
  pointer-events: none;
  animation: sunPulse 6s ease-in-out infinite alternate;
}
@keyframes sunPulse {
  0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  100% { opacity: 1; transform: translateX(-50%) scale(1.15); }
}
/* floating motes - magical dust */
.particle {
  position: absolute; border-radius: 50%;
  pointer-events: none;
  animation: floatUp linear infinite;
}
.particle.gold { background: rgba(255,200,100,0.15); box-shadow: 0 0 6px rgba(255,200,100,0.08); }
.particle.pink { background: rgba(232,120,150,0.12); box-shadow: 0 0 6px rgba(232,120,150,0.06); }
.particle.white { background: rgba(255,255,255,0.1); }
@keyframes floatUp {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-10vh) translateX(40px) rotate(360deg); opacity: 0; }
}
/* warm horizon glow */
#horizon-glow {
  position: absolute; bottom: 20%; left: 10%; right: 10%;
  height: 30%;
  background: radial-gradient(ellipse at center, rgba(255,200,100,0.06) 0%, rgba(255,160,80,0.03) 30%, transparent 60%);
  pointer-events: none;
}
/* vignette */
#vignette {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(5,2,10,0.5) 100%);
}
/* film grain */
#grain {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.012;
  background-image: url(data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMCIgLz48L3N2Zz4=);
  background-repeat: repeat; background-size: 200px 200px;
}

/* ── views ── */
.view { display: none; position: relative; z-index: 1; }
.view.active { display: block; }

/* ── shelf view ── */
#view-shelf { min-height: 100vh; padding: 60px 40px 80px; }
.shelf-header {
  text-align: center; margin-bottom: 16px;
  font-size: 42px; font-weight: 300; letter-spacing: 8px;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
  text-shadow: 0 2px 40px rgba(232,160,90,0.15);
}

/* ── book cards ── */
#shelf-surface {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px; max-width: 1200px; margin: 0 auto; padding: 40px 20px;
}
.book-card {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: 30px 20px 24px;
  border-radius: 10px;
  background: rgba(220,190,160,0.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(220,190,160,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  overflow: hidden;
  line-height: 2;
}
.book-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(232,160,90,0.06), transparent 60%);
  opacity: 0; transition: opacity 0.5s;
}
.book-card:hover {
  transform: translateY(-6px);
  border-color: rgba(232,160,90,0.2);
  background: rgba(255,255,255,0.04);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 30px rgba(232,160,90,0.05);
}
.book-card:hover::before { opacity: 1; }
.book-card-emoji { font-size: 36px; margin-bottom: 12px; display: block; }
.book-card-title {
  font-size: 18px; font-weight: 600; color: #fff;
  margin-bottom: 4px; line-height: 1.3;
}
.book-card-author {
  font-size: 13px; color: rgba(255,255,255,0.45);
  margin-bottom: 12px;
}
.book-card-meta {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}
.book-card-progress {
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px; overflow: hidden; margin-top: 6px;
}
.book-card-progress-fill {
  height: 100%; background: #e8a05a;
  border-radius: 3px; transition: width 0.5s ease;
}
.book-card-progress-text {
  font-size: 12px; color: rgba(232,160,90,0.7);
  margin-top: 4px;
}
.book-card-imported {
  font-size: 11px; color: rgba(255,255,255,0.2);
  margin-bottom: 6px;
}
#import-btn-wrap {
  display: flex; justify-content: center; padding: 20px 0 40px;
}
#import-btn {
  padding: 10px 24px; border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 10px; background: rgba(255,255,255,0.02);
  color: rgba(255,255,255,0.35); cursor: pointer;
  font-family: inherit; font-size: 14px;
  transition: all 0.3s;
}
#import-btn:hover {
  border-color: rgba(232,160,90,0.3);
  color: #e8a05a; background: rgba(232,160,90,0.04);
}

/* ── detail view ── */
#view-detail { min-height: 100vh; padding: 0 40px 80px; }
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 20px 0; color: rgba(255,255,255,0.4);
  cursor: pointer; font-size: 15px;
  transition: color 0.25s; background: none; border: none; font-family: inherit;
}
.detail-back:hover { color: #e8a05a; }
#detail-content {
  max-width: 900px; margin: 0 auto;
  display: flex; flex-direction: column;
}
.detail-hero {
  display: flex; gap: 40px; align-items: flex-start;
  margin-bottom: 40px;
}
.detail-cover {
  flex-shrink: 0; width: 180px; height: 240px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
}
.detail-info { flex: 1; }
.detail-info h1 {
  font-size: 30px; font-weight: 700; color: #fff;
  margin-bottom: 6px; line-height: 1.2;
}
.detail-info .detail-author {
  font-size: 18px; color: rgba(255,255,255,0.55);
  margin-bottom: 16px;
}
.detail-tags {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
}
.detail-tag {
  padding: 4px 12px; border-radius: 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 13px; color: rgba(255,255,255,0.5);
}
.detail-desc {
  font-size: 16px; color: rgba(255,255,255,0.7);
  line-height: 1.7; margin-bottom: 24px;
}
.detail-actions {
  display: flex; gap: 12px; margin-bottom: 6px;
}
.btn-start {
  padding: 14px 36px; border: none; border-radius: 10px;
  background: #e8a05a; color: #0a0a1a;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.3s; font-family: inherit;
}
.btn-start:hover { background: #f0b06a; transform: translateY(-1px); box-shadow: 0 8px 30px rgba(232,160,90,0.2); }
.btn-continue {
  padding: 14px 36px; border: 1px solid rgba(232,160,90,0.3); border-radius: 10px;
  background: transparent; color: #e8a05a;
  font-size: 16px; font-weight: 500; cursor: pointer;
  transition: all 0.3s; font-family: inherit;
}
.btn-continue:hover { background: rgba(232,160,90,0.08); }

.detail-chapters-title {
  margin: 40px 0 16px;
  font-size: 18px; font-weight: 600; color: #fff;
  letter-spacing: 2px; text-transform: uppercase;
}
#detail-chapter-list { display: flex; flex-direction: column; gap: 0; }
.detail-chapter-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  color: rgba(255,255,255,0.65); font-size: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.detail-chapter-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
.detail-chapter-item .ch-num {
  width: 28px; color: rgba(255,255,255,0.25); font-size: 13px;
}
.detail-chapter-item .ch-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(232,160,90,0.0); flex-shrink: 0;
  transition: background 0.3s;
}
.detail-chapter-item .ch-dot.done { background: #e8a05a; }
.detail-chapter-item .ch-dot.current { background: #e8a05a; box-shadow: 0 0 8px rgba(232,160,90,0.5); }
.detail-chapter-item .ch-title { flex: 1; }

/* ── reader view ── */
#view-reader {
  display: none; min-height: 100vh;
}
#view-reader.active {
  display: flex; flex-direction: row;
}

/* ── sidebar ── */
#sidebar {
  width: 260px; flex-shrink: 0;
  background: rgba(220,195,170,0.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid rgba(220,195,170,0.06);
  padding: 0; display: flex; flex-direction: column;
  height: 100vh; position: sticky; top: 0;
  overflow: hidden; z-index: 10;
  box-shadow: 4px 0 30px rgba(0,0,0,0.1);
}
#sidebar-top {
  padding: 18px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
#sidebar-back {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; color: rgba(255,255,255,0.4);
  font-family: inherit; font-size: 14px; cursor: pointer;
  padding: 0 0 10px; transition: color 0.25s;
}
#sidebar-back:hover { color: #e8a05a; }
#sidebar-book-title {
  font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.8);
  line-height: 1.3;
}
#sidebar-chapters {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
#sidebar-chapters::-webkit-scrollbar { width: 4px; }
#sidebar-chapters::-webkit-scrollbar-track { background: transparent; }
#sidebar-chapters::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
.ch-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer;
  color: rgba(255,255,255,0.65); font-size: 14px;
  transition: all 0.2s; border-left: 2px solid transparent;
}
.ch-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
.ch-item.active {
  background: rgba(232,160,90,0.06);
  border-left-color: #e8a05a;
  color: #fff;
}
.ch-item .ch-sq {
  width: 22px; height: 22px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0;
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.35);
  transition: all 0.25s;
}
.ch-item.active .ch-sq { background: rgba(232,160,90,0.2); color: #e8a05a; }
.ch-item.done .ch-sq { background: rgba(232,160,90,0.1); color: rgba(232,160,90,0.5); }

/* ── reader main ── */
#reader-main {
  flex: 1; display: flex; flex-direction: column;
  position: relative;
}
.reader-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 40px;
  border-bottom: 1px solid rgba(220,195,170,0.06);
  background: rgba(220,195,170,0.03);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.reader-topbar-left { display: flex; align-items: center; gap: 16px; }
#reader-book-name {
  font-size: 14px; color: rgba(255,255,255,0.35);
}
#theme-btn {
  background: none; border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.4); width: 36px; height: 36px;
  border-radius: 8px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
}
#theme-btn:hover { border-color: rgba(232,160,90,0.3); color: #e8a05a; }
#reader-content {
  flex: 1; overflow-y: auto; padding: 50px 60px 0;
  position: relative;
}
#reader-content::-webkit-scrollbar { width: 6px; }
#reader-content::-webkit-scrollbar-track { background: transparent; }
#reader-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
#chapter-title {
  font-size: 28px; font-weight: 700; color: #fff;
  margin-bottom: 30px; line-height: 1.3;
}
#chapter-text {
  font-size: 18px; line-height: 2;
  color: rgba(255,255,255,0.85);
  max-width: 700px; margin: 0 auto;
  white-space: pre-wrap;
  text-shadow: 0 1px 20px rgba(0,0,0,0.3);
}
#trans-tooltip {
  position: absolute; z-index: 999; display: none;
  background: rgba(10,8,25,0.95); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 12px 16px;
  max-width: 300px; backdrop-filter: blur(20px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  transform: translateX(-50%);
  pointer-events: auto;
}
#trans-orig {
  font-size: 14px; color: rgba(255,255,255,0.4);
  margin-bottom: 4px; white-space: normal;
}
#trans-result {
  font-size: 16px; color: #fff; font-weight: 500;
  white-space: normal;
}
#trans-loading {
  font-size: 13px; color: rgba(255,255,255,0.3); display: none;
}
#trans-speak {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; color: rgba(255,255,255,0.3);
  font-size: 16px; cursor: pointer; padding: 4px;
  transition: color 0.2s; font-family: inherit;
  line-height: 1;
}
#trans-speak:hover { color: #e8a05a; }
#reader-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; padding: 20px 60px 10px;
  border-top: 1px solid rgba(220,195,170,0.04);
}
.nav-btn {
  padding: 10px 24px; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.6); cursor: pointer;
  font-size: 14px; font-family: inherit;
  transition: all 0.25s;
}
.nav-btn:hover { border-color: rgba(232,160,90,0.3); color: #e8a05a; background: rgba(232,160,90,0.05); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }
.nav-btn:disabled:hover { border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.03); }
.nav-btn.active-listen { background: rgba(232,80,60,0.12); border-color: rgba(232,80,60,0.3); color: #e85040; }
#chapter-indicator {
  font-size: 14px; color: rgba(255,255,255,0.35);
  min-width: 140px; text-align: center;
}
#listen-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 8px 60px 18px;
  font-size: 13px; color: rgba(255,255,255,0.4);
  flex-wrap: wrap;
}
#listen-bar button {
  background: none; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px; color: rgba(255,255,255,0.5);
  cursor: pointer; padding: 4px 10px; font-size: 14px;
  font-family: inherit; transition: all 0.2s;
}
#listen-bar button:hover { border-color: rgba(232,160,90,0.3); color: #e8a05a; }
#listen-bar button.active-source { border-color: rgba(232,160,90,0.3); color: #e8a05a; background: rgba(232,160,90,0.08); }
#listen-status { min-width: 80px; text-align: left; font-size: 12px; color: rgba(255,255,255,0.3); }
#listen-bar select {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px; color: rgba(255,255,255,0.5); padding: 4px 8px;
  font-family: inherit; font-size: 12px; cursor: pointer;
  transition: border-color 0.2s; max-width: 180px;
}
#listen-bar select:hover { border-color: rgba(232,160,90,0.3); }
#listen-bar select option { background: #1a0a2e; color: rgba(255,255,255,0.7); }

/* ── themes ── */
.theme-dots {
  display: flex; gap: 8px;
}
.theme-dot {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.25s;
}
.theme-dot:hover { transform: scale(1.15); }
.theme-dot.active { border-color: #fff; }

<script>
/* ── globals ── */
var BOOK_REGISTRY = {};
var IMPORTED_META = [];
var curBook = null;
var curBookData = null;
var curCh = 0;
var _importFileText = '';

function registerBook(id, data) { BOOK_REGISTRY[id] = data; }

/* ── IndexedDB ── */
var DB_PROMISE = null;
function getDB() {
  if (DB_PROMISE) return DB_PROMISE;
  DB_PROMISE = new Promise(function(resolve, reject) {
    var req = indexedDB.open('bs-db', 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('books'))
        db.createObjectStore('books', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('translations'))
        db.createObjectStore('translations', { keyPath: 'id' });
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = reject;
  });
  return DB_PROMISE;
}

function dbPut(store, val) {
  return getDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readwrite');
      tx.objectStore(store).put(val);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = reject;
    });
  });
}

function dbGet(store, id) {
  return getDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readonly');
      var req = tx.objectStore(store).get(id);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = reject;
    });
  });
}

function dbGetAll(store) {
  return getDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readonly');
      var req = tx.objectStore(store).getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = reject;
    });
  });
}

function dbDelete(store, id) {
  return getDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readwrite');
      tx.objectStore(store).delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = reject;
    });
  });
}

/* ── view switching ── */
function switchView(id) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

/* ── lazy load book ── */
function lazyLoadBook(id) {
  // check imported books first
  var imp = IMPORTED_META.find(function(x) { return x.id === id; });
  if (imp) {
    return dbGet('books', id).then(function(book) {
      if (book) return book.data;
      return null;
    });
  }
  // fallback to static books
  return new Promise(function(resolve, reject) {
    if (BOOK_REGISTRY[id]) { resolve(BOOK_REGISTRY[id]); return; }
    var s = document.createElement('script');
    s.src = 'books/' + id + '.js';
    s.onload = function() {
      // also load translations if available
      var st = document.createElement('script');
      st.src = 'books/' + id + '-ar.js';
      st.onerror = function() {}; // ignore if missing
      document.head.appendChild(st);
      resolve(BOOK_REGISTRY[id]);
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

/* ── find book meta from either manifest or imported ── */
function findBookMeta(id) {
  var b = BOOKS_MANIFEST.find(function(x) { return x.id === id; });
  if (b) return b;
  return IMPORTED_META.find(function(x) { return x.id === id; });
}

/* ── progress ── */
function getProgress(bookId) {
  try { return JSON.parse(localStorage.getItem('bs-progress') || '{}')[bookId] || 0; }
  catch(e) { return 0; }
}
function setProgress(bookId, ch) {
  var p = {};
  try { p = JSON.parse(localStorage.getItem('bs-progress') || '{}'); } catch(e) {}
  p[bookId] = ch;
  localStorage.setItem('bs-progress', JSON.stringify(p));
}

/* ── themes ── */
function setTheme(t) {
  document.body.className = 'theme-' + t;
  document.querySelectorAll('.theme-dot').forEach(function(d) {
    d.classList.toggle('active', d.dataset.theme === t);
  });
  localStorage.setItem('bs-theme', t);
}
(function() {
  var saved = localStorage.getItem('bs-theme');
  if (saved) setTheme(saved);
})();

/* ── favorites (Firestore + localStorage cache) ── */
var favsCache = [];
var favsLoaded = false;
function getFavs() { return favsCache; }
function saveFavs(arr) {
  favsCache = arr;
  localStorage.setItem('bs-favs', JSON.stringify(arr));
}
function firestoreSet(arr) {
  db.collection('favorites').doc('all').set({ items: arr }, { merge: true }).catch(function(err) {
    console.warn('Firestore write failed, using local only:', err);
  });
}
function addFav(text) {
  if (!text || !text.trim()) return;
  var arr = getFavs();
  var meta = findBookMeta(curBook);
  var chIdx = curCh;
  var chTitle = '';
  try {
    var book = BOOK_REGISTRY[curBook];
    if (book && book[chIdx]) chTitle = book[chIdx].title || '';
  } catch(e) {}
  var date = new Date();
  var fav = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2,6),
    bookId: curBook,
    bookTitle: meta ? meta.title : '',
    chIdx: chIdx,
    chTitle: chTitle,
    text: text.trim(),
    note: '',
    ts: date.toISOString()
  };
  arr.push(fav);
  saveFavs(arr);
  firestoreSet(arr);
  renderFavs();
}
function delFav(id) {
  var arr = getFavs().filter(function(f) { return f.id !== id; });
  saveFavs(arr);
  firestoreSet(arr);
  renderFavs();
}
function updateFavNote(id, note) {
  var arr = getFavs();
  arr.forEach(function(f) { if (f.id === id) f.note = note; });
  saveFavs(arr);
  firestoreSet(arr);
}
function navToFav(f) {
  openCh(f.bookId, f.chIdx);
}
function toggleFavPanel() {
  var p = document.getElementById('fav-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderFavs();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderFavs() {
  var list = document.getElementById('fav-list');
  var count = document.getElementById('fav-count');
  var arr = getFavs();
  count.textContent = arr.length ? '(' + arr.length + ')' : '';
  if (!arr.length) {
    list.innerHTML = '<div id="fav-empty"><span class="fav-empty-icon">☆</span>No favorites yet.<br>Select text in the reader and add it here.</div>';
    return;
  }
  var html = '';
  arr.forEach(function(f) {
    var note = f.note || '';
    html += '<div class="fav-item" data-id="' + f.id + '">' +
      '<button class="fav-del" onclick="delFav(\'' + f.id + '\')" title="Remove">✕</button>' +
      '<div class="fav-text">' + escHtml(f.text) + '</div>' +
      '<div class="fav-meta">' +
        '<span class="fav-source" onclick="navToFav({bookId:\'' + f.bookId + '\',chIdx:' + f.chIdx + '})">' + escHtml(f.bookTitle || '') + (f.chTitle ? ' &middot; ' + escHtml(f.chTitle) : '') + '</span>' +
        '<span>' + new Date(f.ts).toLocaleDateString() + '</span>' +
      '</div>' +
      '<textarea class="fav-note" placeholder="Add a note..." onchange="updateFavNote(\'' + f.id + '\',this.value)">' + escHtml(note) + '</textarea>' +
    '</div>';
  });
  list.innerHTML = html;
}

function exportFavs() {
  var arr = getFavs();
  var blob = new Blob([JSON.stringify(arr, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'favorites-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);

}
function importFavs(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Not an array');
      var existing = getFavs();
      var merged = existing.concat(imported);
      saveFavs(merged);
      firestoreSet(merged);
      renderFavs();
      alert('Imported ' + imported.length + ' favorites. Total: ' + merged.length);
    } catch(err) {
      alert('Invalid file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

/* ── Browser SpeechSynthesis ── */
function speakChapter() {
  var text = document.getElementById('chapter-text');
  if (!text || !text.textContent.trim()) return;
  speechSynthesis.cancel();
  listenUtterance = new SpeechSynthesisUtterance(text.textContent);
  listenUtterance.rate = listenRate;
  listenUtterance.lang = 'en-US';
  if (listenVoiceName) {
    var voices = speechSynthesis.getVoices();
    var found = voices.filter(function(v) { return v.name === listenVoiceName; });
    if (found.length > 0) listenUtterance.voice = found[0];
  }
  listenUtterance.onstart = function() {
    document.getElementById('listen-play').textContent = '⏸';
    document.getElementById('listen-status').textContent = 'Reading...';
  };
  listenUtterance.onend = function() { listenDone(); };
  listenUtterance.onerror = function() { listenError(); };
  speechSynthesis.speak(listenUtterance);
}

/* ── Online Google TTS ── */
function startOnlineTTS() {
  var text = document.getElementById('chapter-text');
  if (!text || !text.textContent.trim()) return;
  // split into sentences for streaming
  var raw = text.textContent;
  var sentences = raw.match(/[^.!?\n]+[.!?]+/g);
  if (!sentences || sentences.length < 2) {
    // split by length if no punctuation
    sentences = [];
    for (var i = 0; i < raw.length; i += 300) {
      var end = Math.min(i + 300, raw.length);
      sentences.push(raw.substring(i, end));
    }
  }
  onlineQueue = sentences;
  onlinePlaying = false;
  onlinePaused = false;
  document.getElementById('listen-play').textContent = '⏸';
  document.getElementById('listen-status').textContent = 'Reading... (' + onlineQueue.length + ' parts)';
  playNextOnline();
}

function playNextOnline() {
  if (onlinePaused || onlineQueue.length === 0) {
    if (onlineQueue.length === 0) listenDone();
    return;
  }
  onlinePlaying = true;
  var sentence = onlineQueue.shift();
  var url = 'https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=en&q=' + encodeURIComponent(sentence);
  onlineAudio = new Audio(url);
  onlineAudio.rate = listenRate;
  onlineAudio.playbackRate = listenRate;
  onlineAudio.onended = function() {
    onlinePlaying = false;
    if (!onlinePaused) {
      document.getElementById('listen-status').textContent = 'Reading... (' + onlineQueue.length + ' parts left)';
      playNextOnline();
    }
  };
  onlineAudio.onerror = function() {
    // fallback: skip bad part
    onlinePlaying = false;
    playNextOnline();
  };
  onlineAudio.play().catch(function() { listenError(); });
}

function playListen() {
  if (useOnlineTTS) {
    if (onlinePlaying && !onlinePaused) {
      if (onlineAudio) { onlineAudio.pause(); }
      onlinePaused = true;
      document.getElementById('listen-play').textContent = '▶';
      document.getElementById('listen-status').textContent = 'Paused';
    } else if (onlinePaused) {
      onlinePaused = false;
      if (onlineAudio) { onlineAudio.play(); }
      document.getElementById('listen-play').textContent = '⏸';
      document.getElementById('listen-status').textContent = 'Reading...';
    } else {
      startOnlineTTS();
    }
  } else {
    if (!listenUtterance) return;
    if (speechSynthesis.speaking && !speechSynthesis.paused) {
      speechSynthesis.pause();
      document.getElementById('listen-play').textContent = '▶';
      document.getElementById('listen-status').textContent = 'Paused';
    } else if (speechSynthesis.paused) {
      speechSynthesis.resume();
      document.getElementById('listen-play').textContent = '⏸';
      document.getElementById('listen-status').textContent = 'Reading...';
    } else {
      speakChapter();
    }
  }
}

function stopListen() {
  speechSynthesis.cancel();
  listenUtterance = null;
  if (onlineAudio) { onlineAudio.pause(); onlineAudio = null; }
  onlineQueue = [];
  onlinePlaying = false;
  onlinePaused = false;
  isListening = false;
  document.getElementById('listen-bar').style.display = 'none';
  document.getElementById('listen-btn').classList.remove('active-listen');

  document.getElementById('listen-play').textContent = '▶';
}

function listenDone() {
  document.getElementById('listen-status').textContent = 'Finished';
  document.getElementById('listen-play').textContent = '▶';
  document.getElementById('listen-btn').classList.remove('active-listen');
  document.getElementById('listen-btn').textContent = '🔊 Listen';
  isListening = false;

}

function listenError() {

    container.appendChild(s);
  }
  // 2 small constellation clusters
  var clusters = [
    { cx: 20, cy: 12, points: [[0,0],[12,-8],[18,4],[8,10],[22,6]] },
    { cx: 75, cy: 18, points: [[0,0],[10,6],[16,-4],[6,-10],[20,-2]] }
  ];
  clusters.forEach(function(c) {
    var group = document.createElement('div');
    group.className = 'constellation';
    group.style.left = c.cx + '%';
    group.style.top = c.cy + '%';
    c.points.forEach(function(p, idx) {
      if (idx === 0) return;
      var prev = c.points[idx - 1];
      var dx = p[0] - prev[0], dy = p[1] - prev[1];
      var len = Math.sqrt(dx*dx + dy*dy);
      var angle = Math.atan2(dy, dx) * 180 / Math.PI;
      var line = document.createElement('div');
      line.className = 'constellation-line';
      line.style.left = prev[0] + 'px';
      line.style.top = prev[1] + 'px';
      line.style.width = len + 'px';
      line.style.transform = 'rotate(' + angle + 'deg)';
      group.appendChild(line);
    });
    c.points.forEach(function(p) {
      var dot = document.createElement('div');
      dot.className = 'star bright';
      dot.style.width = '3px'; dot.style.height = '3px';
      dot.style.background = 'rgba(255,255,255,0.6)';

function showShelf() {
  switchView('view-shelf');

  curBookData = null;

}

function renderShelf() {
  var surface = document.getElementById('shelf-surface');
  surface.innerHTML = '';
  var all = BOOKS_MANIFEST.concat(IMPORTED_META);
  all.forEach(function(b) {
    var pct = getProgress(b.id);
    var total = b.chapters;
    var done = pct > 0 ? Math.min(pct, total) : 0;
    var pctDisplay = done > 0 ? Math.round((done / total) * 100) : 0;
    var card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML =
      '<span class="book-card-emoji">' + (b.emoji || '📖') + '</span>' +
      '<div class="book-card-title">' + b.title + '</div>' +
      '<div class="book-card-author">' + b.author + '</div>' +
      '<div class="book-card-meta"><span>' + total + ' chapters</span></div>' +
      (b.imported ? '<div class="book-card-imported">imported</div>' : '') +
      (done > 0 ? '<div class="book-card-progress"><div class="book-card-progress-fill" style="width:' + pctDisplay + '%"></div></div><div class="book-card-progress-text">' + done + '/' + total + '</div>' : '');
    card.addEventListener('click', function() { showDetail(b.id); });
    surface.appendChild(card);
  });
}

/* ── DETAIL ── */
function showDetail(bookId) {
  curBook = bookId;
  lazyLoadBook(bookId).then(function(data) {
    if (!data) { showShelf(); return; }
    curBookData = data;
    renderDetail(bookId, data);
    switchView('view-detail');
    window.scrollTo(0, 0);
  });
}

function renderDetail(bookId, data) {
  var b = findBookMeta(bookId);
  if (!b) return;
  var pct = getProgress(bookId);
  var done = pct > 0 ? Math.min(pct, b.chapters) : 0;
  var contCh = done > 0 ? done - 1 : 0;
  var html = '<div class="detail-hero">' +
    '<div class="detail-cover">' + (b.emoji || '📖') + '</div>' +
    '<div class="detail-info">' +
      '<h1>' + b.title + '</h1>' +
      '<div class="detail-author">' + b.author + '</div>' +
      '<div class="detail-tags">' +
        '<span class="detail-tag">' + (b.genre || 'General') + '</span>' +
        '<span class="detail-tag">' + b.chapters + ' chapters</span>' +
        (b.year ? '<span class="detail-tag">' + b.year + '</span>' : '') +
      '</div>' +
      (b.desc ? '<div class="detail-desc">' + b.desc + '</div>' : '') +
      '<div class="detail-actions">' +
        '<button class="btn-start" onclick="startReading(\'' + bookId + '\', ' + contCh + ')">' + (done > 0 ? '▶ Continue Reading' : '▶ Start Reading') + '</button>' +
        (done > 0 ? '<button class="btn-continue" onclick="startReading(\'' + bookId + '\', 0)">↺ From Beginning</button>' : '') +
        (b.imported ? '<button class="btn-continue" style="border-color:rgba(255,80,80,0.3);color:rgba(255,80,80,0.6)" onclick="deleteBook(\'' + bookId + '\')">✕ Remove</button>' : '') +
        '<button class="btn-continue" onclick="translateBook(\'' + bookId + '\')" id="translate-book-btn">🌐 Translate to Arabic</button>' +
      '</div>' +
    '</div>' +
  '</div>' +
  '<div class="detail-chapters-title">Chapters</div>' +
  '<div id="detail-chapter-list">';
  data.forEach(function(ch, i) {
    var chDone = i < done;
    var chCur = i === done - 1;
    html += '<div class="detail-chapter-item" onclick="startReading(\'' + bookId + '\', ' + i + ')">' +
      '<span class="ch-num">' + (i + 1) + '</span>' +
      '<span class="ch-dot' + (chDone ? ' done' : '') + (chCur ? ' current' : '') + '"></span>' +
      '<span class="ch-title">' + ch.title + '</span>' +
    '</div>';
  });
  html += '</div>';
  document.getElementById('detail-content').innerHTML = html;
  // show translate button if not already translated
  var key = 'trans-' + bookId;
  var staticTrans = window.BOOK_TRANSLATIONS && window.BOOK_TRANSLATIONS[bookId];
  if (staticTrans && Object.keys(staticTrans).length > 0) {
    document.getElementById('translate-book-btn').textContent = '📖 Arabic (preloaded)';
    document.getElementById('translate-book-btn').disabled = true;
  } else {
    dbGet('translations', key).then(function(res) {
      var trans = (res && res.data) || null;
      if (!trans || Object.keys(trans).length === 0) document.getElementById('translate-book-btn').style.display = '';
      else document.getElementById('translate-book-btn').textContent = '🌐 Re-translate to Arabic';
    });
  }
}

/* ── book translation ── */
var showArabic = false;
var translationStatus = {};

function translateBook(bookId) {
  var btn = document.getElementById('translate-book-btn');
  btn.textContent = '⏳ Translating...';
  btn.disabled = true;
  // load the book data first
  lazyLoadBook(bookId).then(function(data) {
    if (!data) { btn.textContent = '❌ Error loading book'; btn.disabled = false; return; }
    translateChapters(bookId, data, 0, btn);
  });
}

function translateChapters(bookId, data, idx, btn) {
  if (idx >= data.length) {
    btn.textContent = '✅ Translated! Restart book to view';
    btn.disabled = false;
    return;
  }
  var ch = data[idx];
  var text = ch.title + '\n' + ch.text;
  // split into chunks if too long
  var chunks = [];
  var maxLen = 3000;
  for (var i = 0; i < text.length; i += maxLen) {
    chunks.push(text.substring(i, i + maxLen));
  }
  var translatedChunks = [];
  var c = 0;
  btn.textContent = '⏳ Translating ch ' + (idx + 1) + '/' + data.length + '...';
  chunks.forEach(function(chunk) {
    var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=' + encodeURIComponent(chunk);
    fetch(url).then(function(r) { return r.json(); }).then(function(j) {
      var t = '';
      try { t = j[0].map(function(s) { return s[0]; }).join(''); } catch(e) { t = ''; }
      translatedChunks.push(t);
      c++;
      if (c === chunks.length) {
        // store translation
        var full = translatedChunks.join('');
        var firstNewline = full.indexOf('\n');
        var transTitle = firstNewline > 0 ? full.substring(0, firstNewline) : '';
        var transText = firstNewline > 0 ? full.substring(firstNewline + 1) : full;
        if (!translationStatus[bookId]) translationStatus[bookId] = {};
        translationStatus[bookId][idx] = { title: transTitle, text: transText };
        // save to indexedDB
        var key = 'trans-' + bookId;
        dbGet('translations', key).then(function(existingRes) {
          var all = (existingRes && existingRes.data) || {};
          all[idx] = { title: transTitle, text: transText };
          dbPut('translations', { id: key, data: all }).then(function() {
            translateChapters(bookId, data, idx + 1, btn);
          });
        });
      }
    }).catch(function() {
      translatedChunks.push('');
      c++;
      if (c === chunks.length) {
        if (!translationStatus[bookId]) translationStatus[bookId] = {};
        translationStatus[bookId][idx] = { title: '', text: '' };
        translateChapters(bookId, data, idx + 1, btn);
      }
    });
  });
}

function toggleLang() {
  showArabic = !showArabic;
  var btn = document.getElementById('lang-toggle');
  btn.textContent = showArabic ? 'AR' : 'EN';
  btn.style.borderColor = showArabic ? 'rgba(232,160,90,0.3)' : 'rgba(255,255,255,0.08)';
  btn.style.color = showArabic ? '#e8a05a' : 'rgba(255,255,255,0.4)';
  openCh(); // re-render current chapter
}

/* ── READER ── */
function startReading(bookId, chIndex) {
  if (bookId !== curBook) {
    curBook = bookId;
    lazyLoadBook(bookId).then(function(data) {
      if (!data) { showShelf(); return; }
      curBookData = data;
      curCh = chIndex;
      openCh();
      switchView('view-reader');
    });
  } else {
    curCh = chIndex;
    openCh();
    switchView('view-reader');
  }
  // show lang toggle if translation exists
  var key = 'trans-' + bookId;
  var staticTrans = window.BOOK_TRANSLATIONS && window.BOOK_TRANSLATIONS[bookId];
  var btn = document.getElementById('lang-toggle');
  if (staticTrans && Object.keys(staticTrans).length > 0) {
    btn.style.display = '';
  } else {
    dbGet('translations', key).then(function(res) {
      var trans = (res && res.data) || null;
      if (trans && Object.keys(trans).length > 0) {
        btn.style.display = '';
      } else {
        btn.style.display = 'none';
      }
    });
  }
}

function openCh() {
  if (!curBookData || curCh < 0 || curCh >= curBookData.length) return;
  var ch = curBookData[curCh];

  // check for Arabic translation
  if (showArabic) {
    // check preloaded static translations first, then IndexedDB
    var tData = (window.BOOK_TRANSLATIONS && window.BOOK_TRANSLATIONS[curBook]) || null;
    if (tData && tData[curCh]) {
      var tc = tData[curCh];
      document.getElementById('chapter-title').textContent = tc.title || ch.title;
      renderText(tc.text || ch.text);
    } else {
      var key = 'trans-' + curBook;
      dbGet('translations', key).then(function(res) {
        var trans = (res && res.data) || null;
        if (trans && trans[curCh]) {
          var tc = trans[curCh];
          document.getElementById('chapter-title').textContent = tc.title || ch.title;
          renderText(tc.text || ch.text);
        } else {
          document.getElementById('chapter-title').textContent = ch.title;
          renderText(ch.text);
        }
      });
    }
  } else {
    document.getElementById('chapter-title').textContent = ch.title;
    renderText(ch.text);
  }

  document.getElementById('chapter-indicator').textContent = 'Chapter ' + (curCh + 1) + ' of ' + curBookData.length;
  document.getElementById('prev-ch').disabled = curCh === 0;
  document.getElementById('next-ch').disabled = curCh === curBookData.length - 1;
  setProgress(curBook, curCh + 1);
  renderSidebar();
  var content = document.getElementById('reader-content');
  if (content) content.scrollTop = 0;
  document.querySelectorAll('.detail-chapter-item').forEach(function(el, i) {
    el.style.color = i === curCh ? '#e8a05a' : '';
  });
  var b = findBookMeta(curBook);
  if (b) {
    document.getElementById('sidebar-book-title').textContent = b.title;
    document.getElementById('reader-book-name').textContent = b.title;
  }
}

function renderText(text) {
  // normalize: collapse single newlines, insert paragraph breaks every ~5 sentences
  text = text.replace(/\r\n/g, '\n').replace(/\n{3,}/g, '\n\n');
  var hasParaBreaks = text.indexOf('\n\n') >= 0;
  if (hasParaBreaks) {
    text = text.split('\n\n').map(function(p) { return p.replace(/\n/g, ' ').trim(); }).join('\n\n\n');
  } else {
    var flat = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
    var sentences = flat.match(/[^.!?\n]+[.!?]+/g);
    if (sentences && sentences.length > 3) {
      var groups = [];
      for (var i = 0; i < sentences.length; i += 5) {
        groups.push(sentences.slice(i, i + 5).join(' ').trim());
      }
      text = groups.join('\n\n\n');
    } else {
      var words = flat.split(' ');
      var groups = [];
      for (var i = 0; i < words.length; i += 60) {
        groups.push(words.slice(i, i + 60).join(' '));
      }
      text = groups.join('\n\n\n');
    }
  }
  document.getElementById('chapter-text').textContent = text;
  // set RTL for Arabic
  document.getElementById('chapter-text').dir = showArabic ? 'rtl' : 'ltr';
  document.getElementById('chapter-title').dir = showArabic ? 'rtl' : 'ltr';
}

function prevChapter() {
  if (curCh > 0) { curCh--; openCh(); }
}

function nextChapter() {
  if (curBookData && curCh < curBookData.length - 1) { curCh++; openCh(); }
}

function goToChapter(i) {
  curCh = i;
  openCh();
}

function renderSidebar() {
  var list = document.getElementById('sidebar-chapters');
  list.innerHTML = '';
  if (!curBookData) return;
  var lastDone = getProgress(curBook);
  curBookData.forEach(function(ch, i) {
    var item = document.createElement('div');
    item.className = 'ch-item';
    if (i === curCh) item.classList.add('active');
    else if (i < lastDone) item.classList.add('done');
    item.innerHTML = '<span class="ch-sq">' + (i + 1) + '</span><span>' + ch.title + '</span>';
    item.addEventListener('click', function() { goToChapter(i); });
    list.appendChild(item);
  });
}

/* ── IMPORT ── */
document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var name = file.name.replace(/\.(txt|docx?)$/i, '').replace(/[_\-]/g, ' ');
  document.getElementById('modal-title').value = name;
  document.getElementById('modal-author').value = '';

  function onText(text) {
    _importFileText = text;
    updateChapterPreview();
    document.getElementById('modal-overlay').classList.add('open');
  }

  if (/\.docx?$/i.test(file.name)) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      mammoth.extractRawText({ arrayBuffer: ev.target.result }).then(function(r) {
        onText(r.value);
      }).catch(function() {
        alert('Could not read Word file. Try saving as .txt instead.');
      });
    };
    reader.readAsArrayBuffer(file);
  } else {
    var reader = new FileReader();
    reader.onload = function(ev) { onText(ev.target.result); };
    reader.readAsText(file);
  }
  this.value = '';
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function detectChapters(text, mode) {
  var positions = [];
  var match, re;

  if (mode === 'numbered' || mode === 'auto') {
    re = /^(\d+)[\.\)]\s+(.+)$/gm;
    while ((match = re.exec(text)) !== null) {
      positions.push({ num: parseInt(match[1]), title: match[2].trim(), index: match.index, raw: match[0] });
    }
    if (positions.length >= 2) return splitByPositions(text, positions);
  }

  if (mode === 'chapter-word' || mode === 'auto') {
    positions = [];
    re = /^Chapter\s+(\d+)\s*[:\-–]?\s*(.*)$/gim;
    while ((match = re.exec(text)) !== null) {
      positions.push({ num: parseInt(match[1]), title: match[2].trim() || 'Chapter ' + match[1], index: match.index, raw: match[0] });
    }
    if (positions.length >= 2) return splitByPositions(text, positions);
  }

  // fallback: double newlines
  var parts = text.split(/\n\s*\n\s*\n/);
  if (parts.length < 2) parts = text.split(/\n\s*\n/);
  return parts.filter(function(p) { return p.trim(); }).map(function(p, i) {
    var lines = p.trim().split('\n');
    var title = lines[0].trim().substring(0, 60);
    return { num: i + 1, title: title, text: p.trim() };
  });
}

function splitByPositions(text, positions) {
  var chapters = [];
  for (var i = 0; i < positions.length; i++) {
    var start = positions[i].index + positions[i].raw.length;
    var end = i < positions.length - 1 ? positions[i + 1].index : text.length;
    var body = text.substring(start, end).trim();
    chapters.push({
      num: positions[i].num || i + 1,
      title: positions[i].title || 'Chapter ' + (i + 1),
      text: body
    });
  }
  return chapters;
}

function updateChapterPreview() {
  var mode = document.getElementById('modal-split').value;
  var chs = detectChapters(_importFileText, mode);
  document.getElementById('modal-chapter-count').textContent = chs.length + ' chapters detected';
  var preview = chs.slice(0, 8).map(function(c, i) {
    return (i + 1) + '. ' + c.title;
  }).join('\n');
  if (chs.length > 8) preview += '\n... and ' + (chs.length - 8) + ' more';
  document.getElementById('modal-chapter-preview').textContent = preview;
}

document.getElementById('modal-split').addEventListener('change', updateChapterPreview);

function confirmImport() {
  var title = document.getElementById('modal-title').value.trim();
  var author = document.getElementById('modal-author').value.trim() || 'Unknown';
  var mode = document.getElementById('modal-split').value;
  if (!title) { alert('Please enter a title'); return; }
  var chs = detectChapters(_importFileText, mode);
  if (chs.length === 0) { alert('No chapters detected. Try a different split method.'); return; }

  var id = 'imported-' + Date.now();
  var book = {
    id: id,
    title: title,
    author: author,
    desc: 'Imported from text file — ' + chs.length + ' chapters',
    chapters: chs.length,
    emoji: '📄',
    year: new Date().getFullYear(),
    genre: 'Imported',
    data: chs
  };

  dbPut('books', book).then(function() {
    IMPORTED_META.push({
      id: id, title: title, author: author,
      desc: book.desc, chapters: chs.length,
      emoji: '📄', year: book.year, genre: 'Imported',
      imported: true
    });
    closeModal();
    renderShelf();
  });
}

/* ── delete imported book ── */
function deleteBook(id) {
  if (!confirm('Remove this imported book?')) return;
  dbDelete('books', id).then(function() {
    IMPORTED_META = IMPORTED_META.filter(function(b) { return b.id !== id; });
    var p = {};
    try { p = JSON.parse(localStorage.getItem('bs-progress') || '{}'); } catch(e) {}
    delete p[id];
    localStorage.setItem('bs-progress', JSON.stringify(p));
    showShelf();
    renderShelf();
  });
}

/* ── keyboard nav ── */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('modal-overlay').classList.contains('open')) {
    closeModal(); return;
  }
  if (!document.getElementById('view-reader').classList.contains('active')) return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevChapter(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); nextChapter(); }
  if (e.key === 'Escape') {
    if (curBook) showDetail(curBook);
  }
});

/* ── translate on double-click ── */
var transTooltip = document.createElement('div');
transTooltip.id = 'trans-tooltip';
transTooltip.innerHTML = '<div id="trans-orig"></div><div id="trans-result"></div><div id="trans-loading">translating…</div><button id="trans-speak" title="Hear pronunciation">🔊</button>';
document.body.appendChild(transTooltip);

var transTimer = null;

document.getElementById('reader-content').addEventListener('mouseup', function(e) {
  if (transTimer) clearTimeout(transTimer);
  transTimer = setTimeout(function() {
    var sel = window.getSelection();
    var text = sel.toString().trim();
    if (!text || text.length > 100) { hideTrans(); return; }
    var range = sel.getRangeAt(0);
    var rect = range.getBoundingClientRect();
    var top = rect.bottom + window.scrollY + 8;
    var left = rect.left + rect.width / 2 + window.scrollX;
    transTooltip.style.top = top + 'px';
    transTooltip.style.left = left + 'px';
    document.getElementById('trans-orig').textContent = text;
    document.getElementById('trans-result').textContent = '';
    document.getElementById('trans-loading').style.display = 'block';
    transTooltip.style.display = 'block';
    // fetch translation
    var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=' + encodeURIComponent(text);
    fetch(url).then(function(r) { return r.json(); }).then(function(data) {
      var t = '';
      if (data && data[0]) {
        for (var i = 0; i < data[0].length; i++) {
          if (data[0][i][0]) t += data[0][i][0];
        }
      }
      document.getElementById('trans-loading').style.display = 'none';
      if (t) {
        document.getElementById('trans-result').textContent = t;
      } else {
        document.getElementById('trans-result').textContent = '(no translation)';
      }
    }).catch(function() {
      document.getElementById('trans-loading').style.display = 'none';
      document.getElementById('trans-result').textContent = '(error)';
    });
    }, 200);
});

document.getElementById('trans-speak').addEventListener('click', function() {
  var text = document.getElementById('trans-orig').textContent;
  if (!text) return;
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
});

document.addEventListener('mousedown', function(e) {
  if (transTooltip && !transTooltip.contains(e.target)) {
    hideTrans();
  }
});

function hideTrans() {
  if (transTooltip) transTooltip.style.display = 'none';
}

/* ── load imported books from IDB on init ── */
function loadImportedBooks() {
  return dbGetAll('books').then(function(books) {
    IMPORTED_META = (books || []).map(function(b) {
      return {
        id: b.id, title: b.title, author: b.author,
        desc: b.desc, chapters: b.data.length,
        emoji: b.emoji || '📄', year: b.year || '', genre: b.genre || 'Imported',
        imported: true
      };
    });
    renderShelf();
    BOOKS_MANIFEST.forEach(function(b) { lazyLoadBook(b.id); });
  });
}

/* ── load favorites from Firestore ── */
function loadFavsFromFirestore() {
  db.collection('favorites').doc('all').get().then(function(doc) {
    if (doc.exists && doc.data().items) {
      var remote = doc.data().items;
      var local = [];
      try { local = JSON.parse(localStorage.getItem('bs-favs') || '[]'); } catch(e) {}
      // merge: remote wins, keep local that aren't in remote
      var remoteIds = {};
      remote.forEach(function(f) { remoteIds[f.id] = true; });
      var merged = remote.slice();
      local.forEach(function(f) { if (!remoteIds[f.id]) merged.push(f); });
      saveFavs(merged);
      renderFavs();
    }
    favsLoaded = true;
  }).catch(function(err) {
    console.warn('Firestore read failed, using local cache:', err);
    favsLoaded = true;
    try { saveFavs(JSON.parse(localStorage.getItem('bs-favs') || '[]')); } catch(e) {}
  });
}

/* ── init ── */
loadImportedBooks();
setTimeout(loadFavsFromFirestore, 1000);

/* ── PWA install ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
